services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - helpdesk

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helpdesk

volumes:
  postgres_data:

networks:
  helpdesk:
